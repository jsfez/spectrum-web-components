name: Argos

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # Argos authenticates via OIDC — no token secret required

jobs:
  visual-tests:
    name: Visual testing (Argos)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so Argos can resolve the base commit

      - name: Setup Job and Install Dependencies
        uses: ./.github/actions/setup-job

      - name: Build Storybook
        working-directory: 2nd-gen/packages/swc
        run: yarn storybook:build
        env:
          NODE_ENV: production

      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium

      - name: Capture screenshots with Argos
        run: yarn playwright test -c argos/playwright.config.ts
